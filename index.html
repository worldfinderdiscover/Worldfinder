<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldFinder</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #111111;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        #map {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        /* CENTRAL HUD CONTROL PILL */
        #action-pill-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1005;
            display: flex;
            justify-content: center;
        }
        #action-pill {
            background: rgba(26, 31, 44, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 6px;
            display: flex;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .pill-toggle {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }
        .pill-toggle.active {
            background: #00e5ff;
            color: #11141d;
            box-shadow: 0 2px 12px rgba(0, 229, 255, 0.4);
        }

        .user-location-dot {
            background-color: #007bff;
            border: 2px solid white;
            border-radius: 50%;
            box-shadow: 0 0 10px #007bff;
        }

        /* DRAWER ENGINE (DRAWER A: INPUT OVERLAY) */
        #inputPanel {
            position: absolute;
            bottom: -450px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: #1a1f2c;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px 24px 24px 24px;
            padding: 24px;
            box-sizing: border-box;
            z-index: 1010;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.6);
            transition: transform 0.35s cubic-bezier(0.25, 1, 0.5, 1), bottom 0.35s ease;
        }
        /* Uses standard transform logic to match slider mechanics */
        #inputPanel.active {
            bottom: 100px; 
        }
        #inputPanel input, #inputPanel select {
            width: 100%;
            background: #11141d;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            padding: 12px;
            color: white;
            box-sizing: border-box;
            font-size: 14px;
            margin-bottom: 14px;
            outline: none;
        }
        .panel-actions {
            display: flex;
            gap: 10px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
        }
        .btn-primary { background: #00e5ff; color: #11141d; }
        .btn-secondary { background: #343a40; color: #ccc; }

        /* DRAWER B: DISCOVERY SLIDING PANEL Framework */
        .sliding-drawer {
            position: absolute;
            bottom: 0;
            width: 100%;
            max-width: 500px;
            height: 38vh;
            background: #1a1f2c;
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px 24px 0 0;
            padding: 24px;
            box-sizing: border-box;
            color: white;
            left: 50%;
            transform: translate(-50%, 100%);
            transition: transform 0.35s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 1009;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.6);
        }
        .sliding-drawer.open {
            transform: translate(-50%, 0);
        }
        .drawer-handle {
            width: 40px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            margin: -12px auto 16px auto;
        }

        /* NEON MULTI-TIER VISUAL GLOWS */
        .neon-pin-icon { background: #ff0055; border: 2px solid #fff; border-radius: 50%; box-shadow: 0 0 12px #ff0055; }
        .pro-pin-icon { background: #00e5ff; border: 2px solid #fff; border-radius: 50%; box-shadow: 0 0 12px #00e5ff; }
        .anchor-pin-icon { background: #ffea00; border: 2px solid #fff; border-radius: 50%; box-shadow: 0 0 12px #ffea00; }
        .landmark-pin-icon { background: #d500f9; border: 2px solid #fff; border-radius: 50%; box-shadow: 0 0 12px #d500f9; }

        .leaflet-popup-content-wrapper {
            background: #1a1f2c !important;
            color: white !important;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px !important;
        }
        .leaflet-popup-tip { background: #1a1f2c !important; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="action-pill-container">
        <div id="action-pill">
            <button id="btn-drop-pulse" class="pill-toggle active">Drop a Pulse</button>
            <button id="btn-catch-vibe" class="pill-toggle">Catch a Vibe</button>
        </div>
    </div>

    <div id="inputPanel">
        <div class="drawer-handle"></div>
        <h4 style="margin: 0 0 12px 0; color: #fff; font-size: 16px;">Drop a Local Story</h4>
        <input type="text" id="pinMessageInput" placeholder="What's happening right here?" maxlength="120">
        
        <label style="color: #888; font-size: 11px; display: block; margin-bottom: 6px; font-weight: bold; letter-spacing: 0.5px; text-transform: uppercase;">Choose Lifespan</label>
        <select id="pinTierSelect">
            <option value="1">1 Hour — Free Pulse</option>
            <option value="6">6 Hours — Pro Spot (Simulated $1)</option>
            <option value="24">24 Hours — Anchor Spot (Simulated $2)</option>
            <option value="168">1 Week — Landmark (Simulated $6)</option>
        </select>

        <div class="panel-actions">
            <button class="btn btn-secondary" id="cancelPinBtn">Cancel</button>
            <button class="btn btn-primary" id="submitPinBtn">Publish Pin</button>
        </div>
    </div>

    <div id="drawer-vibe" class="sliding-drawer">
        <div class="drawer-handle"></div>
        <h4 style="margin: 0 0 12px 0; color: #fff; font-size: 16px;">Active Local Vibes</h4>
        <div id="proximity-feed-list">
            <p style="color: #666; font-size: 13px; text-align: center; margin-top: 30px;">
                Tap a glowing cluster on the map to view the live area stream...
            </p>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/pocketbase/js-sdk@latest/dist/pocketbase.umd.js"></script>

    <script>
        console.log("Fallback layout container synced.");

        // Hooks up the UI panel controls explicitly using your script's exact hooks
        const map = L.map('map', { zoomControl: false }).setView([33.4242, -111.9281], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const pb = new PocketBase('https://worldfinder-worldfinder.hf.space');
        let currentUserLatLng = null;
        let userLocationMarker = null;
        const MAX_RADIUS_METERS = 200; 
        const activeMarkers = {};
        let pendingPinLatLng = null;

        function generateSecureDeviceToken() {
            const buffer = new Uint8Array(16);
            window.crypto.getRandomValues(buffer);
            return Array.from(buffer, b => b.toString(16).padStart(2, '0')).join('');
        }
        if (!localStorage.getItem('wf_device_secret')) {
            localStorage.setItem('wf_device_secret', generateSecureDeviceToken());
        }
        const currentDeviceSecret = localStorage.getItem('wf_device_secret');
        const currentGuestID = currentDeviceSecret.substring(0, 15); 

        function drawPinOnMap(pinData) {
            if (pinData.message === "DELETED_BY_OWNER") {
                if (activeMarkers[pinData.id]) {
                    map.removeLayer(activeMarkers[pinData.id]);
                    delete activeMarkers[pinData.id];
                }
                return;
            }
            if (activeMarkers[pinData.id]) return;

            const createdTime = new Date(pinData.created); 
            const hours = pinData.duration_hours || 1; 
            const lifespanInMs = hours * 60 * 60 * 1000; 
            const expirationTime = new Date(createdTime.getTime() + lifespanInMs);
            if ((expirationTime.getTime() - new Date().getTime()) <= 0) return; 

            let pinStyle = 'neon-pin-icon';
            let label = 'Live Pulse (Free)';
            if (hours === 6) { pinStyle = 'pro-pin-icon'; label = 'Pro Spot'; }
            else if (hours === 24) { pinStyle = 'anchor-pin-icon'; label = 'Anchor Spot'; }
            else if (hours === 168) { pinStyle = 'landmark-pin-icon'; label = 'Landmark Event'; }

            const customIcon = L.divIcon({ className: pinStyle, iconSize: [12, 12] });
            const isOwner = pinData.user_id === currentGuestID;
            const deleteButtonHtml = isOwner ? `<br><button onclick="deletePinPermanently('${pinData.id}')" style="margin-top: 10px; background: #ff0055; color: white; border: none; padding: 6px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; width: 100%;">Remove My Pin</button>` : '';
            const expTimeString = expirationTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            const marker = L.marker([pinData.lat, pinData.lng], { icon: customIcon }).addTo(map).bindPopup(`
                <div style="font-family: sans-serif; min-width: 140px;">
                    <span style="color: #888; font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px;">${label}</span>
                    <p style="margin: 6px 0; font-size: 14px; font-weight: 500; color: #fff;">${pinData.message}</p>
                    <span style="color: rgba(255,255,255,0.6); font-size: 11px;">⏱️ Expires at ${expTimeString}</span>
                    ${deleteButtonHtml}
                </div>
            `);
            activeMarkers[pinData.id] = marker;
        }

        async function deletePinPermanently(pinId) {
            if (confirm("Do you want to clear this pin from the live map?")) {
                try {
                    await pb.collection('pins').update(pinId, { message: "DELETED_BY_OWNER", user_id: currentGuestID });
                } catch (err) { console.error(err); }
            }
        }

        async function syncPinsPipeline() {
            try {
                const records = await pb.collection('pins').getList(1, 50, { sort: '-created' });
                records.items.forEach(pinData => { if (pinData.lat && pinData.lng) drawPinOnMap(pinData); });
            } catch (err) { console.log(err); }
        }

        function startLiveSync() {
            pb.collection('pins').subscribe('*', function (e) {
                if (e.action === 'create' || e.action === 'update') drawPinOnMap(e.record);
                if (e.action === 'delete' && activeMarkers[e.record.id]) {
                    map.removeLayer(activeMarkers[e.record.id]);
                    delete activeMarkers[e.record.id];
                }
            }).catch(err => console.log(err));
        }

        syncPinsPipeline().then(() => { startLiveSync(); });

        if (navigator.geolocation) {
            navigator.geolocation.watchPosition((position) => {
                let lat = position.coords.latitude; let lng = position.coords.longitude;
                if (position.coords.accuracy > 40) { lat = 33.4242; lng = -111.9281; }
                currentUserLatLng = [lat, lng]; 
                if (!userLocationMarker) {
                    map.setView(currentUserLatLng, 17);
                    userLocationMarker = L.marker(currentUserLatLng, { icon: L.divIcon({ className: 'user-location-dot', iconSize: [14, 14] }) }).addTo(map);
                } else { userLocationMarker.setLatLng(currentUserLatLng); }
            }, () => {
                currentUserLatLng = [33.4242, -111.9281];
                if (!userLocationMarker) userLocationMarker = L.marker(currentUserLatLng, { icon: L.divIcon({ className: 'user-location-dot', iconSize: [14, 14] }) }).addTo(map);
            }, { enableHighAccuracy: true });
        }

        function openInputDrawer(lat, lng) {
            pendingPinLatLng = [lat, lng];
            document.getElementById('pinMessageInput').value = "";
            document.getElementById('pinTierSelect').value = "1";
            document.getElementById('action-pill-container').style.display = "none";
            document.getElementById('inputPanel').classList.add('active');
        }

        function closeInputDrawer() {
            document.getElementById('inputPanel').classList.remove('active');
            setTimeout(() => { document.getElementById('action-pill-container').style.display = "flex"; }, 300);
            pendingPinLatLng = null;
        }

        document.getElementById('cancelPinBtn').addEventListener('click', closeInputDrawer);

        map.on('click', function(e) {
            if (!currentUserLatLng) return;
            if (L.latLng(currentUserLatLng[0], currentUserLatLng[1]).distanceTo(e.latlng) > MAX_RADIUS_METERS) return;
            openInputDrawer(e.latlng.lat, e.latlng.lng);
        });

        document.getElementById('submitPinBtn').addEventListener('click', async () => {
            const message = document.getElementById('pinMessageInput').value.trim();
            const durationHours = parseInt(document.getElementById('pinTierSelect').value);
            if (!message || !pendingPinLatLng) return;
            try {
                const newRecord = await pb.collection('pins').create({ message, lat: pendingPinLatLng[0], lng: pendingPinLatLng[1], duration_hours: durationHours, user_id: currentGuestID });
                drawPinOnMap(newRecord); closeInputDrawer();
            } catch (err) { alert("Database transmission failed."); }
        });
    </script>

    <script src="app.js"></script>
</body>
</html>
